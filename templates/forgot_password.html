<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=asset_version) }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">Golan Pick</div>
    <div class="nav-links">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('pick') }}">Businesses</a>
        <a href="{{ url_for('login') }}">Login</a>
    </div>
</nav>

<div class="container">
    <div class="auth-container">
        <h2 class="auth-title">Forgot password</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" id="forgotPasswordForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" autocomplete="email" inputmode="email" maxlength="254" required>
            </div>

            <button type="submit" class="btn btn-dark w-100" id="forgotPasswordSubmitBtn">Send reset code</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('reset_password') }}" class="btn btn-outline-primary btn-sm">I already have a code</a>
            <a href="{{ url_for('login') }}" class="btn btn-outline-dark btn-sm">Back to login</a>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js', v=asset_version) }}"></script>
<script>
const forgotPasswordForm = document.getElementById('forgotPasswordForm');
const forgotPasswordSubmitBtn = document.getElementById('forgotPasswordSubmitBtn');

forgotPasswordForm?.addEventListener('submit', () => {
    if (forgotPasswordSubmitBtn) {
        forgotPasswordSubmitBtn.disabled = true;
        forgotPasswordSubmitBtn.textContent = 'Sending...';
    }
});
</script>
</body>
</html>
