<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כל החנויות</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">My Marketplace</div>
    <div class="nav-links">
        <a href="/">בית</a>
        <a href="/work">Work</a>
        <a href="/pick">Pick</a>
    </div>
</nav>

<div class="container">
    <h1>חיפוש עסקים</h1>

    <form method="GET" action="/pick" class="booking-form">
        <label>חפש לפי שם חנות או קטגוריה</label>
        <input type="text" name="search" value="{{ search }}" placeholder="למשל barber, nails, clinic">
        <button type="submit">חפש</button>
    </form>

    <div class="features-container" style="margin-top: 40px;">
        {% for store in stores %}
        <div class="feature-card">
            <h3>{{ store.name }}</h3>
            <p><strong>קטגוריה:</strong> {{ store.category }}</p>
            <p><strong>תיאור:</strong> {{ store.description }}</p>
            <p><strong>יתרונות:</strong> {{ store.advantages }}</p>
            <p><strong>מחיר:</strong> ₪{{ store.price }}</p>
            <p><strong>משך:</strong> {{ store.duration_minutes }} דקות</p>
            <a href="/store/{{ store.id }}" class="hero-btn">לצפייה בעסק</a>
        </div>
        {% endfor %}
    </div>
</div>

<script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
</body>
</html>
