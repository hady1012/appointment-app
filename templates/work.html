<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הוספת חנות</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">My Marketplace</div>
    <div class="nav-links">
        <a href="/">בית</a>
        <a href="/work">Work</a>
        <a href="/pick">Pick</a>
    </div>
</nav>

<div class="container">
    <h1>הוספת חנות חדשה</h1>

    <form action="/add-store" method="POST" class="booking-form">
        <label>שם החנות</label>
        <input type="text" name="name" required>

        <label>קטגוריה</label>
        <input type="text" name="category" required>

        <label>תיאור העסק</label>
        <input type="text" name="description" required>

        <label>יתרונות / שירותים</label>
        <input type="text" name="advantages" required>

        <label>מחיר</label>
        <input type="number" step="0.01" name="price" required>

        <label>משך זמן בדקות</label>
        <input type="number" name="duration_minutes" required>

        <button type="submit">שמור חנות</button>
    </form>
</div>

<script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
</body>
</html>
