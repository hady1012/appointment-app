<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: #f8f9fa;
        }

        .auth-container {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .auth-title {
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
        }

        .auth-links a {
            text-decoration: none;
            margin: 0 8px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">My Marketplace</div>
    <div class="nav-links">
        <a href="/">בית</a>
        <a href="/pick">עסקים</a>
        <a href="/signup/customer">הרשמת לקוח</a>
        <a href="/signup/owner">הרשמת בעל עסק</a>
    </div>
</nav>

<div class="container">
    <div class="auth-container">
        <h2 class="auth-title">התחברות</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label for="email" class="form-label">אימייל</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">סיסמה</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-dark w-100">התחבר</button>
        </form>

        <div class="auth-links">
            <p class="mt-3">אין לך חשבון?</p>
            <a href="/signup/customer" class="btn btn-outline-primary btn-sm">הרשמת לקוח</a>
            <a href="/signup/owner" class="btn btn-outline-success btn-sm">הרשמת בעל עסק</a>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
</body>
</html>
