<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose new password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=asset_version) }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">Golan Pick</div>
    <div class="nav-links">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('pick') }}">Businesses</a>
        <a href="{{ url_for('login') }}">Login</a>
    </div>
</nav>

<div class="container">
    <div class="auth-container">
        <h2 class="auth-title">Choose a new password</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" id="resetPasswordForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ email }}" autocomplete="email" inputmode="email" maxlength="254" required>
            </div>

            <div class="mb-3">
                <label for="code" class="form-label">6 digit code</label>
                <input type="text" class="form-control" id="code" name="code" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">New password</label>
                <input type="password" class="form-control" id="password" name="password" autocomplete="new-password" minlength="8" required>
            </div>

            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm new password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" autocomplete="new-password" minlength="8" required>
            </div>

            <button type="submit" class="btn btn-dark w-100" id="resetPasswordSubmitBtn">Update password</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('forgot_password') }}" class="btn btn-outline-primary btn-sm">Send a new code</a>
            <a href="{{ url_for('login') }}" class="btn btn-outline-dark btn-sm">Back to login</a>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js', v=asset_version) }}"></script>
<script>
const resetPasswordForm = document.getElementById('resetPasswordForm');
const resetPasswordSubmitBtn = document.getElementById('resetPasswordSubmitBtn');

resetPasswordForm?.addEventListener('submit', () => {
    if (resetPasswordSubmitBtn) {
        resetPasswordSubmitBtn.disabled = true;
        resetPasswordSubmitBtn.textContent = 'Updating...';
    }
});
</script>
</body>
</html>
